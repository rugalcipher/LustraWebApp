<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0B0D" />
    <meta name="description" content="Lustra — Desire, Reserved. A members-only booking inquiry platform for a private entertainment agency." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Experience Hero — preload the first slide's artwork (wide ≥768px, portrait below). -->
    <link
      rel="preload"
      as="image"
      media="(min-width: 768px)"
      imagesrcset="/home/home-1-wide-1080.webp 1080w, /home/home-1-wide-1440.webp 1440w, /home/home-1-wide-1672.webp 1672w"
      imagesizes="100vw"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      media="(max-width: 767.98px)"
      imagesrcset="/home/home-1-mobile-640.webp 640w, /home/home-1-mobile-900.webp 900w"
      imagesizes="100vw"
      fetchpriority="high"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
    <title>Lustra — Desire, Reserved.</title>
  </head>
